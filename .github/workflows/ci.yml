name: CI

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 23.x, 24.x, latest]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node-version }}
          cache: true
      - run: vp install
      - run: vp check
      - run: vp build
      - run: vp test

  deploy:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: live
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: latest
          cache: true

      - run: vp install
      - run: vp build

      - name: Deploy
        uses: easingthemes/ssh-deploy@v6.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          TARGET: ${{ secrets.REMOTE_DIR }}
          SOURCE: "dist/"
          ARGS: "--delete"
